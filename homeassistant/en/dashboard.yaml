title: froehling PE1
views:
  - title: Overview
    path: overview
    icon: mdi:home-thermometer
    cards:
      - type: markdown
        content: |
          # froehling PE1
          Overview for furnace, heating circuit 1, buffer tank and pellet storage.

          Note: if a card reports a missing entity, adjust the entity ID to your Home Assistant installation.
      - type: entities
        title: Status
        show_header_toggle: false
        entities:
          - entity: sensor.froehling_pe1_system_status
            name: System status
          - entity: sensor.froehling_pe1_furnace_status
            name: Furnace status
          - entity: sensor.froehling_pe1_furnace_temperature
            name: Furnace temperature
          - entity: sensor.froehling_pe1_outside_temperature
            name: Outside temperature
      - type: gauge
        name: Buffer charge
        entity: sensor.froehling_pe1_buffer_charge
        min: 0
        max: 100
        severity:
          green: 70
          yellow: 35
          red: 0
      - type: gauge
        name: Pellet fill level
        entity: sensor.froehling_pe1_pellet_fill_level
        min: 0
        max: 100
        severity:
          green: 50
          yellow: 20
          red: 0
      - type: history-graph
        title: Temperature history
        hours_to_show: 24
        refresh_interval: 60
        entities:
          - entity: sensor.froehling_pe1_furnace_temperature
            name: Furnace
          - entity: sensor.froehling_pe1_outside_temperature
            name: Outside
          - entity: sensor.froehling_pe1_hc1_flow_temperature_actual
            name: HC1 flow actual
          - entity: sensor.froehling_pe1_buffer_temperature_top
            name: Buffer top
          - entity: sensor.froehling_pe1_buffer_temperature_bottom
            name: Buffer bottom

  - title: Furnace
    path: furnace
    icon: mdi:fire
    cards:
      - type: entities
        title: Furnace values
        entities:
          - sensor.froehling_pe1_system_status
          - sensor.froehling_pe1_furnace_status
          - sensor.froehling_pe1_furnace_temperature
          - sensor.froehling_pe1_return_flow_temperature
          - sensor.froehling_pe1_operating_hours
          - sensor.froehling_pe1_hours_since_last_maintenance
          - sensor.froehling_pe1_hours_until_ash_removal
      - type: history-graph
        title: Furnace / return flow temperature
        hours_to_show: 24
        entities:
          - sensor.froehling_pe1_furnace_temperature
          - sensor.froehling_pe1_return_flow_temperature

  - title: Heating circuit 1
    path: heating-circuit-1
    icon: mdi:radiator
    cards:
      - type: entities
        title: Heating circuit 1
        entities:
          - sensor.froehling_pe1_hc1_flow_temperature_actual
          - sensor.froehling_pe1_hc1_flow_temperature_target
          - binary_sensor.froehling_pe1_hc1_pump
          - select.froehling_pe1_hc1_heating_mode
          - number.froehling_pe1_hc1_flow_at_minus_10c_outside_temperature
          - number.froehling_pe1_hc1_flow_at_plus_10c_outside_temperature
      - type: history-graph
        title: HC1 flow
        hours_to_show: 24
        entities:
          - sensor.froehling_pe1_hc1_flow_temperature_actual
          - sensor.froehling_pe1_hc1_flow_temperature_target

  - title: Buffer
    path: buffer
    icon: mdi:water-boiler
    cards:
      - type: entities
        title: Buffer tank
        entities:
          - sensor.froehling_pe1_buffer_temperature_top
          - sensor.froehling_pe1_buffer_temperature_middle
          - sensor.froehling_pe1_buffer_temperature_bottom
          - sensor.froehling_pe1_buffer_charge
          - sensor.froehling_pe1_buffer_pump_control
      - type: history-graph
        title: Buffer temperatures
        hours_to_show: 24
        entities:
          - sensor.froehling_pe1_buffer_temperature_top
          - sensor.froehling_pe1_buffer_temperature_middle
          - sensor.froehling_pe1_buffer_temperature_bottom

  - title: Pellets
    path: pellets
    icon: mdi:storage-tank
    cards:
      - type: entities
        title: Pellet storage
        entities:
          - sensor.froehling_pe1_pellet_fill_level
          - sensor.froehling_pe1_pellet_consumption_kg
          - sensor.froehling_pe1_total_pellet_consumption
      - type: history-graph
        title: Pellet fill level
        hours_to_show: 168
        entities:
          - sensor.froehling_pe1_pellet_fill_level
      - type: statistics-graph
        title: Pellet consumption
        days_to_show: 30
        chart_type: line
        stat_types:
          - state
        entities:
          - sensor.froehling_pe1_pellet_consumption_kg
          - sensor.froehling_pe1_total_pellet_consumption

  - title: Controls
    path: controls
    icon: mdi:tune
    cards:
      - type: markdown
        content: |
          ## Warning: write access

          This view contains entities that can change heating parameters.
          Use only after verifying registers and allowed value ranges for your system.
      - type: entities
        title: Heating circuit 1 controls
        entities:
          - select.froehling_pe1_hc1_heating_mode
          - number.froehling_pe1_hc1_flow_at_minus_10c_outside_temperature
          - number.froehling_pe1_hc1_flow_at_plus_10c_outside_temperature

  - title: Raw values
    path: raw-values
    icon: mdi:format-list-bulleted
    cards:
      - type: entities
        title: All basic entities
        entities:
          - sensor.froehling_pe1_system_status
          - sensor.froehling_pe1_furnace_status
          - sensor.froehling_pe1_furnace_temperature
          - sensor.froehling_pe1_return_flow_temperature
          - sensor.froehling_pe1_outside_temperature
          - sensor.froehling_pe1_hc1_flow_temperature_actual
          - sensor.froehling_pe1_hc1_flow_temperature_target
          - sensor.froehling_pe1_buffer_temperature_top
          - sensor.froehling_pe1_buffer_temperature_middle
          - sensor.froehling_pe1_buffer_temperature_bottom
          - sensor.froehling_pe1_buffer_charge
          - sensor.froehling_pe1_pellet_fill_level
          - sensor.froehling_pe1_pellet_consumption_kg
          - sensor.froehling_pe1_total_pellet_consumption
