- name: froehling_pe1
  type: tcp
  host: 192.168.178.xxx # IP des RS232/RS485-zu-Ethernet-Gateways anpassen
  port: 502
  sensors:
    - name: Fröling PE1 Anlagenzustand Enum
      unique_id: froehling_pe1_anlagenzustand_enum
      slave: 2
      input_type: input
      address: 4000
      scan_interval: 30
      device_class: enum
    - name: Fröling PE1 Kesselzustand Enum
      unique_id: froehling_pe1_kesselzustand_enum
      slave: 2
      input_type: input
      address: 4001
      scan_interval: 30
      device_class: enum
    - name: Fröling PE1 HK1 Betriebsart Enum
      unique_id: froehling_pe1_hk1_betriebsart_enum
      slave: 2
      input_type: holding
      address: 8046
      scan_interval: 30
      device_class: enum
    - name: Fröling PE1 Kesseltemperatur
      unique_id: froehling_pe1_kesseltemperatur
      slave: 2
      input_type: input
      address: 0
      scan_interval: 30
      scale: 0.5
      precision: 1
      device_class: temperature
      state_class: measurement
      unit_of_measurement: °C
    - name: Fröling PE1 Rücklauftemperatur
      unique_id: froehling_pe1_ruecklauftemperatur
      slave: 2
      input_type: input
      address: 9
      scan_interval: 30
      scale: 0.5
      precision: 1
      device_class: temperature
      state_class: measurement
      unit_of_measurement: °C
    - name: Fröling PE1 Außentemperatur
      unique_id: froehling_pe1_aussentemperatur
      slave: 2
      input_type: input
      address: 1000
      scan_interval: 30
      scale: 0.5
      precision: 1
      device_class: temperature
      state_class: measurement
      unit_of_measurement: °C
    - name: Fröling PE1 HK1 Vorlauf Ist
      unique_id: froehling_pe1_hk1_vorlauf_ist
      slave: 2
      input_type: input
      address: 1030
      scan_interval: 30
      scale: 0.5
      precision: 1
      device_class: temperature
      state_class: measurement
      unit_of_measurement: °C
    - name: Fröling PE1 HK1 Vorlauf Soll
      unique_id: froehling_pe1_hk1_vorlauf_soll
      slave: 2
      input_type: input
      address: 1031
      scan_interval: 30
      scale: 0.5
      precision: 1
      device_class: temperature
      state_class: measurement
      unit_of_measurement: °C
    - name: Fröling PE1 Puffer Temperatur oben
      unique_id: froehling_pe1_puffer_temperatur_oben
      slave: 2
      input_type: input
      address: 2000
      scan_interval: 30
      scale: 0.5
      precision: 1
      device_class: temperature
      state_class: measurement
      unit_of_measurement: °C
    - name: Fröling PE1 Puffer Temperatur Mitte
      unique_id: froehling_pe1_puffer_temperatur_mitte
      slave: 2
      input_type: input
      address: 2001
      scan_interval: 30
      scale: 0.5
      precision: 1
      device_class: temperature
      state_class: measurement
      unit_of_measurement: °C
    - name: Fröling PE1 Puffer Temperatur unten
      unique_id: froehling_pe1_puffer_temperatur_unten
      slave: 2
      input_type: input
      address: 2002
      scan_interval: 30
      scale: 0.5
      precision: 1
      device_class: temperature
      state_class: measurement
      unit_of_measurement: °C
    - name: Fröling PE1 Puffer Ladezustand
      unique_id: froehling_pe1_puffer_ladezustand
      slave: 2
      input_type: input
      address: 2006
      scan_interval: 30
      scale: 1
      precision: 0
      unit_of_measurement: "%"
    - name: Fröling PE1 Pelletfüllstand
      unique_id: froehling_pe1_pelletfuellstand
      slave: 2
      input_type: input
      address: 21
      scan_interval: 3600
      scale: 0.005
      precision: 1
      unit_of_measurement: "%"
    - name: Fröling PE1 Pelletverbrauch kg
      unique_id: froehling_pe1_pelletverbrauch_kg
      slave: 2
      input_type: input
      address: 81
      scan_interval: 3600
      scale: 1
      precision: 0
      device_class: weight
      state_class: total_increasing
      unit_of_measurement: kg
