title: Fröling PE1
views:
  - title: Übersicht
    path: uebersicht
    icon: mdi:fire
    cards:
      - type: markdown
        content: |
          # Fröling PE1

          Live-Dashboard für Roys Fröling PE1 über die offizielle Home-Assistant-ESPHome-Integration.

          Verifizierte ESPHome-Config-Entry: `froehling PE1`

          Hinweis: Schreib-/Steuer-Entities werden in diesem Dashboard bewusst nicht als Bedienelemente eingebaut, bis Register und Wertebereiche an der realen Anlage geprüft sind.
      - type: grid
        columns: 2
        square: false
        cards:
          - type: gauge
            entity: sensor.froehling_pe1_froehling_pe1_kesseltemperatur
            name: Kessel °C
            min: 0
            max: 100
            severity:
              green: 0
              yellow: 65
              red: 85
          - type: gauge
            entity: sensor.froehling_pe1_froehling_pe1_puffer_ladezustand
            name: Puffer %
            min: 0
            max: 100
            severity:
              red: 0
              yellow: 30
              green: 60
          - type: gauge
            entity: sensor.froehling_pe1_froehling_pe1_pelletfuellstand
            name: Pellets %
            min: 0
            max: 100
            severity:
              red: 0
              yellow: 20
              green: 50
          - type: gauge
            entity: sensor.froehling_pe1_froehling_pe1_aussentemperatur
            name: Außen °C
            min: -20
            max: 45
      - type: entities
        title: Status
        entities:
          - sensor.froehling_pe1_froehling_pe1_anlagenzustand
          - sensor.froehling_pe1_froehling_pe1_kesselzustand
          - binary_sensor.froehling_pe1_froehling_pe1_hk1_pumpe
          - sensor.froehling_pe1_froehling_pe1_pufferpumpe_ansteuerung
          - sensor.froehling_pe1_froehling_pe1_stunden_bis_asche_entleeren
          - sensor.froehling_pe1_froehling_pe1_stunden_seit_letzter_wartung
      - type: history-graph
        title: Temperaturen 24h
        hours_to_show: 24
        entities:
          - sensor.froehling_pe1_froehling_pe1_kesseltemperatur
          - sensor.froehling_pe1_froehling_pe1_puffer_temperatur_oben
          - sensor.froehling_pe1_froehling_pe1_puffer_temperatur_mitte
          - sensor.froehling_pe1_froehling_pe1_puffer_temperatur_unten
          - sensor.froehling_pe1_froehling_pe1_hk1_vorlauf_ist
          - sensor.froehling_pe1_froehling_pe1_aussentemperatur

