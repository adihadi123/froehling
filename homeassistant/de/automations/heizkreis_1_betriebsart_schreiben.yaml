# Beispiel: HK1 Betriebsart über input_select in Modbus Holding Register 8046 schreiben.
# Vor Benutzung Hub-Name und Entity-IDs prüfen.

alias: froehling PE1 HK1 Betriebsart schreiben
mode: single
trigger:
  - platform: state
    entity_id: input_select.froehling_pe1_hk1_betriebsart
condition: []
action:
  - service: modbus.write_register
    data:
      hub: froehling_pe1
      slave: 2
      address: 8046
      value: "{{ trigger.to_state.state[0] | int(0) }}"
