- sensor:
    - name: "Fröling PE1 Anlagenzustand"
      unique_id: froehling_pe1_anlagenzustand
      state: >
        {% set mapper = {
          '0': 'Dauerlast', '1': 'Brauchwasser', '2': 'Automatik',
          '3': 'Scheitholzbetrieb', '4': 'Reinigen', '5': 'Ausgeschaltet',
          '6': 'Extraheizen', '7': 'Kaminkehrer', '8': 'Reinigen'
        } %}
        {{ mapper.get(states('sensor.froling_pe1_anlagenzustand_enum'), 'Unbekannt') }}
      icon: mdi:home-thermometer
    - name: "Fröling PE1 Kesselzustand"
      unique_id: froehling_pe1_kesselzustand
      state: >
        {% set mapper = {
          '0': 'STÖRUNG', '1': 'Kessel Aus', '2': 'Anheizen', '3': 'Heizen',
          '4': 'Feuererhaltung', '5': 'Feuer Aus', '6': 'Tür offen',
          '7': 'Vorbereitung', '8': 'Vorwärmen', '9': 'Zünden',
          '15': 'Abreinigen', '19': 'Betriebsbereit'
        } %}
        {{ mapper.get(states('sensor.froling_pe1_kesselzustand_enum'), 'Code ' ~ states('sensor.froling_pe1_kesselzustand_enum')) }}
      icon: mdi:fire
    - name: "Fröling PE1 HK1 Betriebsart"
      unique_id: froehling_pe1_hk1_betriebsart
      state: >
        {% set mapper = {'0':'Aus','1':'Automatik','2':'Extraheizen','3':'Absenken','4':'Dauerabsenken','5':'Partybetrieb'} %}
        {{ mapper.get(states('sensor.froling_pe1_hk1_betriebsart_enum'), 'Unbekannt') }}
      icon: mdi:radiator
