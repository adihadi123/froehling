sensor:
  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "${friendly_name} HK1 Vorlauf Ist"
    id: ${device_id}_hk1_vorlauf_ist
    register_type: read
    address: 1030
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    value_type: U_WORD
    filters: [{ multiply: 0.5 }]
  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "${friendly_name} HK1 Vorlauf Soll"
    id: ${device_id}_hk1_vorlauf_soll
    register_type: read
    address: 1031
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    value_type: U_WORD
    filters: [{ multiply: 0.5 }]

binary_sensor:
  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "${friendly_name} HK1 Pumpe"
    id: ${device_id}_hk1_pumpe
    register_type: coil
    address: 1029
