esphome:
  name: froehling-pe1-en
  friendly_name: froehling PE1

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:
  baud_rate: 0
  level: INFO

api:
  encryption:
    key: !secret froehling_api_key

ota:
  - platform: esphome
    password: !secret froehling_ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "froehling PE1 Fallback"
    password: !secret froehling_fallback_password

captive_portal:

web_server:
  port: 80

substitutions:
  device_id: froehling_pe1
  friendly_name: "froehling PE1"
  modbus_controller_id: froehling_pe1_controller
  tx_pin: GPIO17
  rx_pin: GPIO16
  modbus_slave_address: "2"

uart:
  - id: uart_froehling
    tx_pin: ${tx_pin}
    rx_pin: ${rx_pin}
    baud_rate: 57600
    data_bits: 8
    stop_bits: 1
    parity: NONE

modbus:
  id: modbus_froehling
  uart_id: uart_froehling

modbus_controller:
  - id: froehling_pe1_controller
    address: ${modbus_slave_address}
    modbus_id: modbus_froehling
    setup_priority: -10
    update_interval: 60s
    command_throttle: 50ms

switch:
  - platform: restart
    name: "${friendly_name} ESP Restart"

packages:
  base: !include packages/base.yaml
  kessel: !include packages/kessel.yaml
  pellet_storage: !include packages/pellet_storage.yaml
  heating_circuit_1: !include packages/heating_circuit_1.yaml
  puffer: !include packages/puffer.yaml
  controls: !include packages/controls.yaml
